name = "abmpartners-demo"
compatibility_date = "2026-04-11"

# Set secrets via: npx wrangler secret put RESEND_API_KEY
# Optional overrides (set as secrets too if desired):
#   CONTACT_TO_EMAIL   - where to send enquiries (default: info@abmpartners.com.au)
#   CONTACT_FROM_EMAIL - sender address (must be verified in Resend, default: noreply@abmpartners.com.au)

[[d1_databases]]
binding = "db"
database_name = "abmpartners-events"
database_id = "075f8510-5613-40a6-818f-7e03b7fdc534"
migrations_dir = "migrations"

[assets]
directory = "./dist" # Where Astro outputs static files
